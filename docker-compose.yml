version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: astrodaily-backend
    environment:
      - CONFIG_PATH=/app/config/config.yaml
      - TZ=Asia/Shanghai
    ports:
      - "9090:9090"
    volumes:
      - ./backend/config/config.yaml:/app/config/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./astro-frontend
    container_name: astrodaily-frontend
    ports:
      - "9091:80"
    depends_on:
      - backend
    restart: unless-stopped
